<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnamese Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #999;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #242424;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-bar.connected .status-dot {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-bar.recording .status-dot {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.9rem;
            color: #ccc;
        }

        .status-latency {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-left: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 56%;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chat-container {
            flex: 1;
            background: #242424;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 400px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            text-align: center;
            padding: 40px 20px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 8px;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #3b82f6;
        }

        .message.assistant .message-avatar {
            background: #333;
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message.user .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
        }

        .message.assistant .message-bubble {
            background: #2a2a2a;
            color: #fff;
        }

        .message-meta {
            font-size: 0.7rem;
            color: #666;
            padding: 0 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .visualizer {
            height: 80px;
            padding: 12px 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            background: #1a1a1a;
        }

        .visualizer-bar {
            width: 4px;
            min-height: 4px;
            background: #3b82f6;
            border-radius: 2px;
        }

        .input-area {
            padding: 16px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .text-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #242424;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .text-input:focus {
            border-color: #3b82f6;
        }

        .text-input::placeholder {
            color: #666;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #333;
            color: white;
            min-width: 48px;
            flex-shrink: 0;
        }

        .btn:hover {
            background: #444;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-record {
            background: #3b82f6;
        }

        .btn-record:hover {
            background: #2563eb;
        }

        .btn-record.recording {
            background: #ef4444;
        }

        .btn-send {
            background: #22c55e;
        }

        .btn-send:hover {
            background: #16a34a;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #242424;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal h2 {
            margin-bottom: 12px;
            font-size: 1.5rem;
        }

        .modal p {
            color: #999;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn-primary {
            width: 100%;
            background: #3b82f6;
            padding: 14px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .message-content {
                max-width: 80%;
            }

            .input-area {
                padding: 12px;
            }

            .btn {
                min-width: 44px;
                padding: 10px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🇻🇳 Voice Assistant</h1>
            <p class="subtitle">Vietnamese Speech Recognition</p>
        </header>

        <div class="status-bar" id="statusBar">
            <div class="status-dot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
            <span class="status-latency" id="statusLatency"></span>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎤</div>
                    <h3>Ready</h3>
                    <p>Press microphone to speak or type below</p>
                </div>
            </div>

            <div class="visualizer" id="visualizer" style="display: none;"></div>

            <div class="input-area">
                <div class="input-row">
                    <button class="btn btn-record" id="recordBtn" title="Record">🎤</button>
                    <input type="text" class="text-input" id="textInput" placeholder="Type your message..." />
                    <button class="btn btn-send" id="sendBtn" title="Send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="connectModal">
        <div class="modal">
            <h2>⚠️ Connection Lost</h2>
            <p>Unable to connect to the server. Please try again.</p>
            <button class="btn btn-primary" id="reconnectBtn">Reconnect</button>
        </div>
    </div>

    <script>
        const state = {
            ws: null,
            sessionId: null,
            isConnected: false,
            isRecording: false,
            audioContext: null,
            analyser: null,
            processingStage: null,
            playbackContext: null,
            nextPlaybackTime: 0
        };

        const el = {
            statusBar: document.getElementById('statusBar'),
            statusText: document.getElementById('statusText'),
            statusLatency: document.getElementById('statusLatency'),
            chatMessages: document.getElementById('chatMessages'),
            emptyState: document.getElementById('emptyState'),
            visualizer: document.getElementById('visualizer'),
            textInput: document.getElementById('textInput'),
            recordBtn: document.getElementById('recordBtn'),
            sendBtn: document.getElementById('sendBtn'),
            connectModal: document.getElementById('connectModal'),
            reconnectBtn: document.getElementById('reconnectBtn')
        };

        function startProcessing(stage) {
            state.processingStage = stage;
        }

        function stopProcessing(stage) {
            if (state.processingStage === stage) {
                state.processingStage = null;
            }
        }

        function updateStatus(status, text) {
            el.statusBar.className = 'status-bar ' + status;
            el.statusText.textContent = text;
        }

        function updateLatency(data) {
            const summary = data.summary || {};
            const breakdown = data.breakdown || {};

            const llm = summary.llm_first_token != null
                ? `${Math.round(summary.llm_first_token)}ms`
                : '--';
            const total = summary.pipeline_total != null
                ? `${Math.round(summary.pipeline_total)}ms`
                : '--';
            const tts = breakdown.tts_synth_total_ms != null
                ? `${Math.round(breakdown.tts_synth_total_ms)}ms`
                : '--';

            el.statusLatency.textContent = `Latency LLM:${llm} | TTS:${tts} | Total:${total}`;
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            state.ws = new WebSocket(wsUrl);
            state.ws.binaryType = 'arraybuffer';
            
            state.ws.onopen = () => {
                state.isConnected = true;
                updateStatus('connected', 'Connected');
                el.connectModal.classList.remove('active');
                state.ws.send(JSON.stringify({ type: 'client_config', audio_format: 'binary' }));
            };
            
            state.ws.onclose = () => {
                state.isConnected = false;
                updateStatus('', 'Disconnected');
                el.connectModal.classList.add('active');
            };
            
            state.ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
            
            state.ws.onmessage = handleMessage;
        }

        function handleMessage(event) {
            if (event.data instanceof ArrayBuffer) {
                handleBinaryAudio(event.data);
                return;
            }
            if (event.data instanceof Blob) {
                event.data.arrayBuffer().then(handleBinaryAudio).catch((err) => {
                    console.error('Audio error:', err);
                });
                return;
            }
            const data = JSON.parse(event.data);
            
            switch (data.type) {
                case 'session':
                    if (data.action === 'connected') {
                        state.sessionId = data.session_id;
                    }
                    break;
                case 'transcript':
                    handleTranscript(data);
                    break;
                case 'response':
                    handleResponse(data);
                    break;
                case 'audio':
                    handleAudio(data);
                    break;
                case 'control':
                    const action = data.action || data.data?.action;
                    if (action === 'mic_unmute') {
                        updateStatus('connected', 'Ready');
                    } else if (action === 'latency') {
                        updateLatency(data);
                    }
                    break;
            }
        }

        function handleTranscript(data) {
            const text = data.text || data.data?.text;
            const isFinal = data.is_final || data.data?.is_final;
            
            if (isFinal && text) {
                stopProcessing('asr');
                addMessage('user', text);
                updateStatus('processing', 'Processing...');
                showTypingIndicator();
                startProcessing('llm');
            }
        }

        function handleResponse(data) {
            const text = data.text || data.data?.text;
            const fullText = data.full_text || data.data?.full_text;
            const isFinal = data.is_final || data.data?.is_final;

            if (text || (isFinal && fullText)) {
                if (state.processingStage === 'llm') {
                    stopProcessing('llm');
                    startProcessing('tts');
                }
                
                hideTypingIndicator();
                updateOrCreateAssistantMessage(text, isFinal, fullText);
                
                if (isFinal) {
                    updateStatus('connected', 'Ready');
                }
            }
        }

        function handleAudio(data) {
            if (state.processingStage === 'tts') {
                stopProcessing('tts');
            }
            // Server sends { type: "audio", audio: "<base64>" }
            const audioData = data.audio;
            if (audioData) {
                const buffer = base64ToArrayBuffer(audioData);
                schedulePcmPlayback(buffer);
            }
        }

        function handleBinaryAudio(buffer) {
            if (state.processingStage === 'tts') {
                stopProcessing('tts');
            }
            if (buffer && buffer.byteLength) {
                schedulePcmPlayback(buffer);
            }
        }

        function addMessage(role, text) {
            el.emptyState.style.display = 'none';
            
            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            const avatar = role === 'user' ? '👤' : '🤖';
            
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-meta">${time}</div>
                </div>
            `;
            
            el.chatMessages.appendChild(div);
            el.chatMessages.scrollTop = el.chatMessages.scrollHeight;
        }

        let currentAssistantMessage = null;

        function updateOrCreateAssistantMessage(text, isFinal, fullText = '') {
            if (!currentAssistantMessage) {
                el.emptyState.style.display = 'none';
                
                const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                
                currentAssistantMessage = document.createElement('div');
                currentAssistantMessage.className = 'message assistant';
                currentAssistantMessage.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <div class="message-bubble"></div>
                        <div class="message-meta">${time}</div>
                    </div>
                `;
                el.chatMessages.appendChild(currentAssistantMessage);
            }
            
            const bubble = currentAssistantMessage.querySelector('.message-bubble');
            if (isFinal && fullText) {
                bubble.textContent = fullText;
            } else if (text) {
                bubble.textContent += text;
            }
            
            if (isFinal) {
                currentAssistantMessage = null;
            }
            
            el.chatMessages.scrollTop = el.chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            if (document.getElementById('typingIndicator')) return;
            
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            el.chatMessages.appendChild(div);
            el.chatMessages.scrollTop = el.chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function startRecording() {
            try {
                ensurePlaybackContext();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                state.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = state.audioContext.createMediaStreamSource(stream);
                
                state.analyser = state.audioContext.createAnalyser();
                state.analyser.fftSize = 64;
                source.connect(state.analyser);
                
                const processor = state.audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(state.audioContext.destination);
                
                processor.onaudioprocess = (e) => {
                    if (!state.isRecording || !state.ws || state.ws.readyState !== WebSocket.OPEN) return;
                    
                    const input = e.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(input.length);
                    
                    for (let i = 0; i < input.length; i++) {
                        pcm16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
                    }
                    
                    state.ws.send(pcm16.buffer);
                };
                
                state.isRecording = true;
                startProcessing('asr');
                el.recordBtn.classList.add('recording');
                el.recordBtn.textContent = '⏹';
                updateStatus('recording', 'Recording...');
                
                el.visualizer.style.display = 'flex';
                initVisualizer();
                
            } catch (err) {
                console.error('Microphone error:', err);
                alert('Unable to access microphone');
            }
        }

        function stopRecording() {
            state.isRecording = false;
            
            if (state.audioContext) {
                state.audioContext.close();
                state.audioContext = null;
            }
            
            el.recordBtn.classList.remove('recording');
            el.recordBtn.textContent = '🎤';
            el.visualizer.style.display = 'none';
            updateStatus('processing', 'Processing...');
        }

        function initVisualizer() {
            el.visualizer.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'visualizer-bar';
                el.visualizer.appendChild(bar);
            }
            updateVisualizer();
        }

        function updateVisualizer() {
            if (!state.isRecording || !state.analyser) return;
            
            const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
            state.analyser.getByteFrequencyData(dataArray);
            
            const bars = el.visualizer.children;
            for (let i = 0; i < bars.length; i++) {
                const value = dataArray[i] || 0;
                const height = Math.max(4, (value / 255) * 60);
                bars[i].style.height = `${height}px`;
            }
            
            requestAnimationFrame(updateVisualizer);
        }

        function ensurePlaybackContext() {
            if (!state.playbackContext || state.playbackContext.state === 'closed') {
                state.playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                state.nextPlaybackTime = state.playbackContext.currentTime;
            }
            if (state.playbackContext.state === 'suspended') {
                state.playbackContext.resume().catch(() => {});
            }
            return state.playbackContext;
        }

        function schedulePcmPlayback(buffer) {
            if (!buffer || buffer.byteLength === 0) return;
            const ctx = ensurePlaybackContext();
            if (!ctx) return;

            // Use a small lookahead buffer to ensure no gaps
            const lookahead = 0.05; 
            const currentTime = ctx.currentTime;
            
            // If the last sound finished a while ago, start from now
            if (state.nextPlaybackTime < currentTime) {
                state.nextPlaybackTime = currentTime + lookahead;
            }

            const int16 = new Int16Array(buffer);
            const audioBuffer = ctx.createBuffer(1, int16.length, 16000);
            const channelData = audioBuffer.getChannelData(0);
            
            for (let i = 0; i < int16.length; i++) {
                channelData[i] = int16[i] / 32768;
            }

            const source = ctx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(ctx.destination);

            const startAt = state.nextPlaybackTime;
            source.start(startAt);
            
            // Increment for next chunk
            state.nextPlaybackTime += audioBuffer.duration;
            
            // Track processing stages for visual feedback
            if (state.processingStage === 'tts') {
                stopProcessing('tts');
            }
        }

        function base64ToArrayBuffer(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function sendMessage() {
            const text = el.textInput.value.trim();
            if (!text || !state.isConnected) return;
            
            ensurePlaybackContext();
            addMessage('user', text);
            el.textInput.value = '';
            
            startProcessing('llm');
            updateStatus('processing', 'Processing...');
            showTypingIndicator();
            
            state.ws.send(JSON.stringify({ type: 'text', text: text }));
        }

        el.recordBtn.addEventListener('click', () => {
            state.isRecording ? stopRecording() : startRecording();
        });

        el.sendBtn.addEventListener('click', sendMessage);
        el.textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        el.reconnectBtn.addEventListener('click', connect);

        connect();
    </script>
</body>
</html>
